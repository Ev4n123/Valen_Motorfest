<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CSS/login.css">
    <link rel="icon" href="/imagenes/ValenLogo.jpeg" type="image/jpeg">
    <title>Inicia Sesion - Valen Motorfest - Velocidad, Conformidad y Comodidad</title>
</head>
<body>
    <video autoplay muted loop playsinline>
        <source src="/imagenes/tiktok-nowatermark.mp4" type="video/mp4">
    </video>
    
    <div class="titulo">
        <h1>Valen Motorfest</h1>
        <h2>Velocidad, Conformidad, Comodidad</h2>
    </div>

    <div class="contenedor-principal">
        <div class="header">
            <h2>Inicia Sesion</h2>
            <p>Ingresa tus datos para continuar</p>
        </div>
        <div class="form">
            <form>
                <div class="user">
                    <input type="text" required placeholder="Nombre">
                </div>
                <div class="password">
                    <input type="password" required placeholder="Contraseña">
                </div>
                <div class="forgot">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>
                <div class="button">
                    <button><a href="index.html" class="ingresar">Ingresar</a></button>
                </div>
            </form>
        </div>
        <div class="account">
            <a href="registro.html">No tienes Cuenta? Crear una nueva</a>
        </div>

    </div>
    
</body>
</html>
